services:
  postgres:
    image: postgres:16-alpine
    container_name: fw-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: firewall_manager
      POSTGRES_USER: fwmgr
      POSTGRES_PASSWORD: fwmgr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fwmgr -d firewall_manager"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  chromadb:
    image: chromadb/chroma:latest
    container_name: fw-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER: ""
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8000"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fw-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts:ro
      - ./.env:/app/.env:ro
    environment:
      LLM_PROVIDER: ollama
      LLM_MODEL: llama3.2
      EMBED_PROVIDER: ollama
      EMBED_MODEL: nomic-embed-text
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://fwmgr:fwmgr@postgres:5432/firewall_manager
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      HUEY_DB_PATH: /app/data/huey.db
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && fw-api"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fw-worker
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      LLM_PROVIDER: ollama
      LLM_MODEL: llama3.2
      EMBED_PROVIDER: ollama
      EMBED_MODEL: nomic-embed-text
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://fwmgr:fwmgr@postgres:5432/firewall_manager
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      HUEY_DB_PATH: /app/data/huey.db
    depends_on:
      postgres:
        condition: service_healthy
    command: python -m huey.bin.huey_consumer src.tasks.huey -w 1 -k thread -l /app/data/worker.log

  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fw-mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      LLM_PROVIDER: ollama
      LLM_MODEL: llama3.2
      EMBED_PROVIDER: ollama
      EMBED_MODEL: nomic-embed-text
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      DATABASE_URL: postgresql+asyncpg://fwmgr:fwmgr@postgres:5432/firewall_manager
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      MCP_TRANSPORT: sse
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8001"
    healthcheck:
      test: ["CMD", "bash", "-c", "</dev/tcp/localhost/8001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      chromadb:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: fw-mcp

volumes:
  chroma_data:
  postgres_data:
